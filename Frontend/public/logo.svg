<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <g stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Light Khaki Part (#A19982) -->
    <g stroke="#a19982">
      <!-- L vertical stem -->
      <line x1="50" y1="65" x2="50" y2="82" />
      <!-- L horizontal base ending in circle curve -->
      <path d="M 50 82 H 74 A 40 40 0 0 0 90 50" />
    </g>
    
    <!-- Dark Taupe Part (#312E24) -->
    <g stroke="#312e24">
      <!-- Rest of the circle -->
      <path d="M 90 50 A 40 40 0 0 0 50 10 A 40 40 0 0 0 10 50 A 40 40 0 0 0 38 88" />
      
      <!-- P / M Left leg -->
      <line x1="28" y1="17" x2="28" y2="83" />
      
      <!-- P loop -->
      <path d="M 28 17 H 44 A 12 12 0 0 1 44 41 H 28" />
      
      <!-- M diagonals -->
      <path d="M 28 41 L 50 58 L 72 41" />
      
      <!-- M right leg -->
      <line x1="72" y1="17" x2="72" y2="71" />
    </g>
  </g>
</svg>
